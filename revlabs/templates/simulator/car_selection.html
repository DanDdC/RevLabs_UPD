{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevLabs - Select Vehicle</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div class="video-bg-container">
        <div class="video-overlay"></div>
    </div>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-brand"><h1>REV<span>LABS</span></h1></a>
        <div class="nav-menu">
            <a href="{% url 'track_selection' %}" class="nav-link">CIRCUITS</a>
            <a href="{% url 'car_selection' %}?track={{ selected_track.slug_id }}" class="nav-link active">VEHICLES</a>
        </div>
        <div class="nav-profile">
            <span class="profile-name">{{ user.username }}</span>
            <img src="{% static 'img/avatar-placeholder.png' %}" alt="{{ user.username }}" class="profile-avatar">
            <form action="{% url 'logout' %}" method="post" class="app-logout-form">
                {% csrf_token %}
                <button type="submit" class="app-logout-btn">LOG OUT</button>
            </form>
        </div>
    </nav>

    <div class="main-ui-wrapper">
        <div class="main-layout">
            <aside class="sidebar">
                <a href="{% url 'track_selection' %}" class="side-item" title="Circuits">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                </a>
                <a href="#" class="side-item active" title="Vehicles">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                </a>
                <a href="#" class="side-item disabled-link" title="Garage" style="opacity: 0.25; pointer-events: none; cursor: not-allowed;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                </a>
            </aside>

            <section class="main-content">
                <header class="page-header">
                    <div class="header-text">
                        <h2 class="page-title">SELECT VEHICLE</h2>
                        <p class="page-subtitle">Choose your machine and unleash its potential.</p>
                    </div>
                    <div class="header-actions">
                        <div class="search-container">
                            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="car-search" class="search-input" placeholder="Search vehicles...">
                        </div>
                    </div>
                </header>

                <div class="car-grid" id="car-grid-container">
                    {% for car in cars %}
                    <a href="{% url 'dashboard' %}?track={{ selected_track.slug_id }}&car={{ car.slug_id }}" class="car-link-wrapper">
                        <div class="car-card">
                            <div class="car-card-top">
                                <h3 class="car-name-text">{{ car.name|upper }}</h3>
                                </div>
                            <div class="car-image-container">
                                <img src="{% static car.image_path %}" alt="{{ car.name }}">
                            </div>
                            <div class="car-specs-row">
                                <span class="car-spec-item">{{ car.power_hp }} HP</span>
                                <span class="car-spec-item">{{ car.weight_kg }} KG</span>
                            </div>
                        </div>
                    </a>
                    {% endfor %}
                </div>
            </section>
        </div>
    </div>

    <script>
        document.getElementById('car-search').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.car-link-wrapper').forEach(car => {
                const name = car.querySelector('.car-name-text').innerText.toLowerCase();
                car.style.display = name.includes(term) ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
