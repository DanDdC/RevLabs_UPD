{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevLabs - Em Breve</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-brand"><h1>REV<span>LABS</span></h1></a>
        <div class="nav-menu">
            <a href="{% url 'track_selection' %}" class="nav-link">CIRCUITS</a>
            <a href="{% url 'car_selection' %}" class="nav-link">VEHICLES</a>
        </div>
        <div class="nav-profile">
            <span class="profile-name">{{ user.username }}</span>
            <img src="{% static 'img/avatar-placeholder.png' %}" alt="{{ user.username }}" class="profile-avatar">
            <form action="{% url 'logout' %}" method="post" class="app-logout-form">
                {% csrf_token %}
                <button type="submit" class="app-logout-btn">LOG OUT</button>
            </form>
        </div>
    </nav>
    <div class="coming-soon-wrapper">
        <div class="coming-soon-card">
            <h1 class="coming-soon-title">EM BREVE...</h1>
            <p class="coming-soon-sub">a adição e configuração de novas pistas e veículos é um processo demorado, estamos trabalhando para adicionar o máximo possível o quanto antes.</p>
            <a href="{% url 'track_selection' %}" class="coming-soon-back">VOLTAR AOS CIRCUITOS</a>
        </div>
    </div>
</body>
</html>
